  - main [ref=e11]:
    - article [ref=e12]:
      - heading "How I Translate Subtitles with LLMs" [level=1] [ref=e13]
      - paragraph [ref=e14]: 2026-06-14
      - button "Choose language" [ref=e17]:
        - text: English
        - img
      - group [ref=e18]:
        - generic "Disclaimer" [ref=e19] [cursor=pointer]:
          - img [ref=e20]
          - generic [ref=e22]: Disclaimer
          - img [ref=e23]
      - paragraph [ref=e25]:
        - img "submarine, Text-based User Interface" [ref=e26]
      - paragraph [ref=e27]: In this article I want to share how I translate subtitles using large language models (LLMs). It just so happens that I watch movies, TV series, documentaries, cartoons, anime, and everything else only with the original audio.
      - paragraph [ref=e28]: "– Why do my ears keep bleeding? – I asked the doctor, and he answered with 100% confidence:"
      - paragraph [ref=e29]: – You’re allergic to dubbing, try subtitles.
      - paragraph [ref=e30]: All the other subtopics, like “why don’t you just watch on streaming services?” and so on, are out of scope for this article.
      - paragraph [ref=e31]: "A few years ago LLMs appeared, but it’s only been about a year since they became good enough for translation. Still, even in 2026 there’s no silver bullet for all subtitle problems. Believe me, there are plenty of them. Here are the top ones:"
      - list [ref=e32]:
        - listitem [ref=e33]: There are no subtitles for the movie at all
        - listitem [ref=e34]: Subtitles exist only in a language I don’t know
        - listitem [ref=e35]: Subtitles exist, but they’re incomplete (yes, that happens too, more on this below)
        - listitem [ref=e36]: Subtitles exist, but they don’t match the edition of the film (theatrical cut, director’s cut, etc.)
        - listitem [ref=e37]: "LLMs are great at translating into many languages, but they break down on subtitles: they ruin timings, drop lines, and so on"
        - listitem [ref=e38]: The text in subtitles has no context, and if the movie is new, the LLM might fail at the translation. Some words differ a lot in translation depending on the time period of the story
      - paragraph [ref=e39]: So the only idea that came to mind is that the LLM needs help somehow. What kind of help can we give it?
      - list [ref=e40]:
        - listitem [ref=e41]: Track translation progress
        - listitem [ref=e42]: Verify the integrity of the result
        - listitem [ref=e43]: Allow comparing the translation with the original
        - listitem [ref=e44]: Allow fixing subtitles if there’s a desync between lines or a frame-rate issue
        - listitem [ref=e45]: Allow assembling the final subtitles from several sources (yes, that happens too)
        - listitem [ref=e46]: Understand the context of the work
      - heading "The submarine utility" [level=2] [ref=e47]
      - paragraph [ref=e48]:
        - text: In January this year I wrote the
        - link "submarine" [ref=e49] [cursor=pointer]:
          - /url: https://github.com/lebe-dev/submarine
        - text: utility, which took on most of these problems. From the very first version, the utility was built around translating subtitles with LLMs, leaning toward the agentic approach (Claude Code, Codex, opencode, and others). That said, I also added a fallback for classic chatbots — for situations where the agent’s limits run out, but there’s still free access to Google AI Studio and a hundred other chatbots.
      - paragraph [ref=e50]: The utility helps the model maintain the integrity of the process and the timings, and also lets it compare the translation with the original. On top of that, it always makes backups.
      - paragraph [ref=e51]:
        - text: The utility also supports JSON output so agents can easily navigate its capabilities. Thanks to
        - code [ref=e52]: Justin Poehnelt
        - text: for the excellent article
        - link "You Need to Rewrite Your CLI for AI Agents" [ref=e53] [cursor=pointer]:
          - /url: https://justin.poehnelt.com/posts/rewrite-your-cli-for-ai-agents/
        - text: .
      - paragraph [ref=e54]: "On top of that, the utility lets you assess the translation using a TUI (Text-based User Interface):"
      - paragraph [ref=e55]:
        - img "submarine, Text-based User Interface" [ref=e56]
      - paragraph [ref=e57]:
        - text: Besides basic up/down navigation, this mode supports various movement options. For example, random jumps (hotkey
        - code [ref=e58]: r
        - text: ). This is handy for eyeballing translation quality.
      - paragraph [ref=e59]: Next, as an example, I’ll walk through how I prepared Russian subtitles for the movie “Silent Friend” (2025).
      - heading "Silent Friend (2025)" [level=2] [ref=e60]
      - paragraph [ref=e61]:
        - text: In 2025, the drama
        - link "Silent Friend" [ref=e62] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/Silent_Friend
        - text: by director
        - link "Ildikó Enyedi" [ref=e63] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/Ildik%C3%B3_Enyedi
        - text: "was released. The film is spoken in three languages — English, German, and Chinese. On top of that, the story spans different time periods: 1908, 1970, and 2020."
      - paragraph [ref=e64]:
        - text: Unfortunately, the film didn’t get wide distribution, so things were pretty grim with subtitles. On
        - link "opensubtitles" [ref=e65] [cursor=pointer]:
          - /url: https://www.opensubtitles.org/en/subtitles/13792243/silent-friend-en
        - text: I found English subtitles, but they turned out to be incomplete. There was also a Russian translation done with an LLM, but based on the reviews, it was incomplete too.
      - paragraph [ref=e66]: So I downloaded the English subtitles and started translating them.
      - heading "Preparing for translation" [level=3] [ref=e67]
      - paragraph [ref=e68]: Before translating subtitles for a movie, it’s important that the LLM has context for the translation.
      - paragraph [ref=e69]: For example, in a medieval context, the word “suffer” means to allow, to permit. In the modern sense — to endure pain.
      - paragraph [ref=e70]: The word “villain” today means “an evil character”, but in a medieval context it meant “a villein — a bonded peasant”.
      - paragraph [ref=e71]:
        - text: So, for the initial general-purpose agent prompt (
        - link "example on github" [ref=e72] [cursor=pointer]:
          - /url: https://github.com/lebe-dev/submarine/blob/main/docs/AGENT-TRANSLATION-FLOW.md
        - text: ), I fed it a description of the film and its plot from
        - link "Wikipedia" [ref=e73] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/Silent_Friend
        - text: .
      - paragraph [ref=e74]:
        - text: As confirmation,
        - code [ref=e75]: Opus 4.8
        - text: (in
        - code [ref=e76]: high
        - text: "mode) explained in its final response that it had taken the differences between time periods into account:"
      - code [ref=e78]:
        - generic [ref=e79]: ⏺ Done. The film Silent Friend (2025) has been fully translated.
        - generic [ref=e80]: Summary
        - generic [ref=e81]: "- Source: Silent.Friend.2025.1080p.WEB-DL.DDP5.1.H.264.en.srt (703 subtitles)"
        - generic [ref=e82]: "- Result: Stille.Freundin.2025.1080p.WEB-DL.DDP5.1.H.264.ru.srt"
        - generic [ref=e83]: "- Progress: 100% (703/703), all checks passed — perfect match, no skipped lines or timecode shifts."
        - generic [ref=e84]: "Translated in chunks of 100 lines, verifying each chunk with verify. A few context-driven decisions across the film's three timelines:"
        - generic [ref=e85]: "- 1908 (Grete): kept Linnaeus's Latin terms (Monandria, Species Plantarum) as in the original — they're part of the academic interrogation scene; forms of address such as \"Fräulein\", \"miss\", \"Mr./Mrs. Winterhalter\" follow the period."
        - generic [ref=e86]: "- 1972 (Hannes/Gundula): colloquial register, using period-appropriate 1970s youth slang (Soviet-era equivalents of \"joint\", \"pigs\", \"sit-down strike\")."
        - generic [ref=e87]: "- 2020 (Wong): neutral, polite style, with terms like \"sensor\" and \"access card\"."
        - generic [ref=e88]: "- Quotes from Goethe and Rilke (Duino Elegies), and the dish name Himmel und Erde, were kept in the German original with a Russian gloss alongside, as in the subtitles."
        - generic [ref=e89]: "- Italic <i> tags, line breaks, and dialogue dashes were preserved."
        - generic [ref=e90]: Backups for each step are saved in backups/.
      - heading "Incomplete subtitles" [level=3] [ref=e91]
      - paragraph [ref=e92]: After that, I started the movie and skipped back and forth to random scenes. At one point I noticed that a number of scenes had no translation. I checked the original English subtitle file, and indeed there was no translation there either. I downloaded another subtitle file from a different translator, and those scenes were translated there.
      - paragraph [ref=e93]: So, in the same session, I asked the agent to fix this — merge the files and translate the missing parts along the way. Opus did a great job translating the missing fragments and inserted them using my utility.
      - heading "Desync" [level=3] [ref=e94]
      - paragraph [ref=e95]: While watching the movie, comfortably on the couch, about half an hour before the end I ran into a desync. Luckily, VLC for Android TV makes it very easy to figure out the lag (-9 seconds). I quickly fixed it while watching, but I also needed to fix the final subtitle file that I was planning to share with other people.
      - paragraph [ref=e96]:
        - text: The utility comes with a set of commands for fixing delays or drift; similar cases are described in the
        - link "documentation" [ref=e97] [cursor=pointer]:
          - /url: https://github.com/lebe-dev/submarine/blob/main/docs/usecases/README.md
        - text: . The agent handles this without any trouble.
      - heading "Conclusion" [level=2] [ref=e98]
      - paragraph [ref=e99]: Of course, I haven’t solved absolutely every subtitle translation problem — for example, I still don’t know how to determine the gender of a speaker. The next experiment I want to try is transcribing the audio track and getting some kind of markup indicating the speaker’s gender. But even that won’t give 100% accuracy :)
